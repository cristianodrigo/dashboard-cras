services:
  dashboard:
    build: .
    container_name: dashboard-cras
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Banco SQLite persistente
      - dashboard_data:/app/data
      # Dados JSON (permite atualização sem rebuild)
      - ./client/public/data:/app/dist/public/data:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/dashboard"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  dashboard_data:
    driver: local
